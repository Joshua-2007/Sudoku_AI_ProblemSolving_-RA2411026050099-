<!DOCTYPE html>
<html>
<head>
<title>Tic Tac Toe AI</title>
<style>
body {
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
}

h2 {
    margin-top: 20px;
    animation: fadeIn 1s ease-in-out;
}

#status {
    margin: 10px;
    font-size: 18px;
    color: #00eaff;
}

table {
    margin: auto;
    border-spacing: 10px;
    animation: popIn 0.6s ease;
}

td {
    width: 80px;
    height: 80px;
    font-size: 35px;
    text-align: center;
    background: #2e2e48;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
}

td:hover {
    background: #3e3e66;
    transform: scale(1.1);
}

td.filled {
    cursor: default;
}

td.win {
    background: #00ff99 !important;
    color: black;
    animation: glow 0.5s infinite alternate;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    background: #00eaff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.3s;
}

button:hover {
    background: #00bcd4;
    transform: scale(1.1);
}

@keyframes popIn {
    from {transform: scale(0.5); opacity: 0;}
    to {transform: scale(1); opacity: 1;}
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

@keyframes glow {
    from {box-shadow: 0 0 5px #00ff99;}
    to {box-shadow: 0 0 15px #00ff99;}
}
</style>
</head>

<body>

<h2>Tic Tac Toe AI 🤖</h2>
<div id="status">Your Turn (X)</div>

<table id="board"></table>
<button onclick="reset()">Restart</button>

<script>
let board = ["","","","","","","","",""];
let human = "X";
let ai = "O";
let gameOver = false;

let table = document.getElementById("board");
let statusText = document.getElementById("status");

for(let i=0;i<3;i++){
    let row = table.insertRow();
    for(let j=0;j<3;j++){
        let cell = row.insertCell();
        cell.onclick = () => move(i*3+j);
    }
}

function move(index){
    if(board[index] !== "" || gameOver) return;

    board[index] = human;
    draw();

    let winCombo = getWin(board, human);
    if(winCombo){
        highlight(winCombo);
        statusText.innerText = "🎉 You Win!";
        gameOver = true;
        return;
    }

    statusText.innerText = "AI Thinking...";
    setTimeout(() => {
        aiMove();

        let winComboAI = getWin(board, ai);
        if(winComboAI){
            highlight(winComboAI);
            statusText.innerText = "😈 AI Wins!";
            gameOver = true;
        } else if(!board.includes("")){
            statusText.innerText = "🤝 Draw!";
            gameOver = true;
        } else {
            statusText.innerText = "Your Turn (X)";
        }
    }, 400);
}

function draw(){
    for(let i=0;i<9;i++){
        let cell = table.rows[Math.floor(i/3)].cells[i%3];
        cell.innerHTML = board[i];
        if(board[i] !== "") cell.classList.add("filled");
    }
}

function aiMove(){
    let best = minimax(board, ai).index;
    board[best] = ai;
    draw();
}

function minimax(newBoard, player){
    let avail = newBoard.map((v,i)=>v===""?i:null).filter(v=>v!==null);

    if(getWin(newBoard, human)) return {score: -10};
    if(getWin(newBoard, ai)) return {score: 10};
    if(avail.length === 0) return {score: 0};

    let moves = [];

    for(let i of avail){
        let move = {};
        move.index = i;
        newBoard[i] = player;

        move.score = minimax(newBoard, player===ai?human:ai).score;

        newBoard[i] = "";
        moves.push(move);
    }

    return player === ai
        ? moves.reduce((best,m)=> m.score>best.score?m:best)
        : moves.reduce((best,m)=> m.score<best.score?m:best);
}

function getWin(b,p){
    let combos = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];
    return combos.find(c => c.every(i => b[i] === p));
}

function highlight(combo){
    combo.forEach(i=>{
        table.rows[Math.floor(i/3)].cells[i%3].classList.add("win");
    });
}

function reset(){
    board = ["","","","","","","","",""];
    gameOver = false;
    statusText.innerText = "Your Turn (X)";

    for(let i=0;i<3;i++){
        for(let j=0;j<3;j++){
            let cell = table.rows[i].cells[j];
            cell.innerHTML = "";
            cell.classList.remove("filled","win");
        }
    }
}
</script>

</body>
</html>
